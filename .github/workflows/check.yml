name: Check BookMyShow Booking Status

on:
  schedule:
    # Every 5 minutes (GitHub's minimum interval). Actual runs may lag
    # slightly during high load — usually still well under 10 min.
    - cron: "*/5 * * * *"
  workflow_dispatch: {}   # lets you trigger it manually from the Actions tab

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install --with-deps chromium

      - name: Run checker
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: python monitor.py

      - name: Commit updated state
        run: |
          git config user.name "bms-alert-bot"
          git config user.email "bot@users.noreply.github.com"
          git add state.json
          if ! git diff --staged --quiet; then
            git commit -m "Update state [skip ci]"
            git pull --rebase origin main
            git push origin main
          fi
